<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <title>ExercisesPlayer</title>
  <style>
    html { background: #e0e0e0; }
    body { max-width: 500px; margin: 0 auto; background: #f8f8f8; min-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
  </style>
  <script><%= htmlWebpackPlugin.options.script %></script>
  <script>
    // Match Taro pxtransform: root = 20 * clientWidth / 375, cap at 500px body
    !function(){
      var MAX_W = 500;
      function recalc(){
        var w = Math.min(document.documentElement.clientWidth, MAX_W);
        var x = 20 * w / 375;
        document.documentElement.style.fontSize = (x >= 40 ? 40 : x <= 20 ? 20 : x) + 'px';
      }
      recalc();
      window.addEventListener('resize', recalc);
    }();
  </script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
